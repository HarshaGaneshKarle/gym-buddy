<!DOCTYPE html>
<html>
<head>
    <title>Gym Buddy Finder</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <h1>Gym Buddy Finder</h1>
        <p class="tagline">Find someone to train with in your city</p>

        <div class="form-box">
            <h2>Join the Community</h2>
            <input type="text" id="name" placeholder="Your Name">
            <input type="text" id="city" placeholder="Your City">
            <select id="goal">
                <option value="cut">Cut (Lose Fat)</option>
                <option value="bulk">Bulk (Build Muscle)</option>
                <option value="maintain">Maintain</option>
            </select>
            <select id="level">
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
            </select>
            <button onclick="addBuddy()">Find My Buddy</button>
        </div>

        <div class="buddies-box">
            <h2>People Looking for Gym Buddies</h2>
            <div id="buddyList"></div>
        </div>

    </div>

    <script>
        async function addBuddy() {
            let name = document.getElementById('name').value;
            let city = document.getElementById('city').value;
            let goal = document.getElementById('goal').value;
            let level = document.getElementById('level').value;
            await fetch('/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, city, goal, level })
            });
            loadBuddies();
        }

        async function loadBuddies() {
            let response = await fetch('/buddies');
            let buddies = await response.json();
            let html = '';
            buddies.forEach(b => {
                html += `<div class="buddy-card">
                    <strong>${b.name}</strong> — ${b.city}<br>
                    Goal: ${b.goal} | Level: ${b.level}
                </div>`;
            });
            document.getElementById('buddyList').innerHTML = html;
        }

        loadBuddies();
    </script>
</body>
</html>
